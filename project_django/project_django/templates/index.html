{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>
<body>
    {% if user.is_authenticated %}
        <a href="logout" class="btn-getstarted">Logout</a>
    {% else %}
        <a href="login" class="btn-getstarted">Login</a>
    {% endif %}
    <h1>{{ name }}</h1>
    <h1> test index </h1>
    
    <h1>Input text below</h1>
    <form action="counter" method="post">
        {% csrf_token %}
        <textarea name="text" rows="25" cols="25" id=""></textarea><br>
        <input type="submit" value="submit">
    </form>

    <h2>Features: </h2>
    {% for feature in features %}
        <h3>{{ feature.name }} -<span style="color: blueviolet;"> {{feature.details }}</span></h3>
    {% endfor%}
</body>
</html>
